aid: penn-mutual
name: Penn Mutual
description: >-
  The Penn Mutual Life Insurance Company is a mutual life insurer founded in
  1847 and headquartered in Horsham, Pennsylvania, making it one of the oldest
  mutual life insurance companies in the United States. Owned by its
  policyholders, Penn Mutual offers life insurance and annuity products
  distributed primarily through career and independent financial professionals,
  and operates through a family of companies including Vantis Life Insurance
  Company, Hornor Townsend & Kent (HTK) broker-dealer, and the Penn Insurance
  and Annuity Company (PIA). Penn Mutual divested its long-held wealth
  management subsidiary, Janney Montgomery Scott, to KKR in 2024.
