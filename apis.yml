  - type: Subsidiary
    name: The Penn Insurance and Annuity Company (PIA)
    url: https://www.pennmutual.com
    description: >-
      The Penn Insurance and Annuity Company is a wholly-owned subsidiary of
      Penn Mutual that issues life insurance and annuity products primarily
      through institutional and independent distribution channels.
  - type: Divestiture
    name: Janney Montgomery Scott
    url: https://www.janney.com
    description: >-
      Janney Montgomery Scott, a full-service wealth management and capital
      markets firm, was a wholly-owned subsidiary of Penn Mutual for more than
      40 years until its 2024 sale to funds managed by private equity firm KKR
      & Co. It is included here for historical continuity only and is no longer
      part of the Penn Mutual family of companies.
